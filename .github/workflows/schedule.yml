name: XServer Extend Schedule

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 24 hours at 00:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  extend-server:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chrome

    - name: Run Extension Script
      env:
        USERS_JSON: ${{ secrets.USERS_JSON }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: node action.js

    # --- 新增的防暂停代码开始 ---
    - name: Commit time.txt to repo
      if: success()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 如果 time.txt 不存在，说明是第一次运行
        if [ ! -f time.txt ]; then
          echo "首次生成时间：$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
        else
          echo "$(date +'%Y-%m-%d %H:%M:%S')" > time.txt
        fi
        
        git add time.txt
        
        # 如果有更改再提交
        if git diff --cached --quiet; then
          echo "无变化，无需提交"
        else
          git commit -m "⏱️ 更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin HEAD:main
        fi
    # --- 新增的防暂停代码结束 ---

    - name: Upload Screenshots
      if: always() # Run even if the script fails
      uses: actions/upload-artifact@v4
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5
